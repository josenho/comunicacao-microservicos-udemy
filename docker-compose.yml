version: "3"
services:

  auth:
    image: postgres:15
    container_name: auth
    restart: always
    environment:
      - POSTGRES_DB=auth
      - POSTGRES_USER=admin
      - POSTGRES_PASSWORD=ufc123
    ports:
      - 5434:5432

  product:
    image: postgres:15
    container_name: product
    restart: always
    environment:
      - POSTGRES_DB=product
      - POSTGRES_USER=admin
      - POSTGRES_PASSWORD=ufc123
    ports:
      - 5435:5432

  sales_db:
    image: mongo:latest
    container_name: sales_db
    restart: always
    environment:
      - MONGO_INITDB_ROOT_USERNAME=admin
      - MONGO_INITDB_ROOT_PASSWORD=ufc123
    ports:
      - 27017:27017

  sales-rabbit:
    image: rabbitmq:3-management
    container_name: sales-rabbit
    restart: always
    environment:
      - RABBITMQ_DEFAULT_USER=admin
      - RABBITMQ_DEFAULT_PASS=ufc123
    ports:
      - 5672:5672
      - 15672:15672