server:
  port: ${PORT:8081}

spring:
  application:
    name: product-api

  datasource:
    driver-class-name: org.postgresql.Driver
    url: jdbc:postgresql://localhost:5435/product
    username: admin  # Nota: Garanta que o user no Docker realmente seja admin (ou mude para postgres)
    password: ufc123
    hikari:
      maximum-pool-size: 3 # Substitui o antigo maxActive de forma moderna

  jpa:
    hibernate:
      ddl-auto: create
    show-sql: true     # Nota: Mudou de show_sql para show-sql (hífen)
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true